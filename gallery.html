<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Captured Beauty</title>
    <style>
        @import url('https://googleapis.com');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { color: #2c1a30; overflow-x: hidden; background: linear-gradient(180deg, #f7d6c8 0%, #f5b0a7 50%, #d681a4 100%) fixed; padding-top: 140px; }
        
        body::before, body::after { content: ""; position: fixed; width: 80vw; height: 80vw; border-radius: 50%; z-index: -1; filter: blur(120px); opacity: 0.6; pointer-events: none; }
        body::before { background: radial-gradient(circle, #ffe699 0%, rgba(255,230,153,0) 70%); top: -10%; left: -10%; animation: sunsetShift 15s infinite alternate ease-in-out; }
        body::after { background: radial-gradient(circle, #ff99bb 0%, rgba(255,153,187,0) 70%); bottom: -10%; right: -10%; animation: sunsetShift 20s infinite alternate-reverse ease-in-out; }
        @keyframes sunsetShift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5vw, 5vh) scale(1.1); } }

        nav { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 240, 240, 0.4); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.4); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: #4a154b; }
        .nav-links a { color: #503056; text-decoration: none; margin-left: 25px; font-size: 0.9rem; font-weight: 700; }
        .nav-links a:hover, .nav-links a.active { color: #ff4a7a; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 50px; font-size: 2.8rem; color: #4a154b; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .gallery-item { height: 280px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gallery-item:hover img { transform: scale(1.08); }
        footer { text-align: center; padding: 40px; margin-top: 60px; border-top: 1px solid rgba(255, 255, 255, 0.3); color: #6b4c72; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">The Secret Shore</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="guide.html">Travel Guide</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Moments In Paradise</h1>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://unsplash.com" alt="Beach Sand"></div>
            <div class="gallery-item"><img src="https://unsplash.com" alt="Coastline View"></div>
            <div class="gallery-item"><img src="https://unsplash.com" alt="Clear Ocean"></div>
            <div class="gallery-item"><img src="https://unsplash.com" alt="Palm Shade"></div>
            <div class="gallery-item"><img src="https://unsplash.com" alt="Rocky Shore"></div>
            <div class="gallery-item"><img src="https://unsplash.com" alt="Seafood Coastal Dishes"></div>
        </div>
    </div>

    <footer>&copy; 2026 The Secret Shore Project. Built to highlight our native shores.</footer>
</body>
</html>
